<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>SCS Sim — Live Board</title>
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=Share+Tech+Mono&display=swap"
    rel="stylesheet">
  <style>
    :root {
      --bg: #040c18;
      --teal: #00b4d8;
      --gold: #f4a261;
      --green: #2ec4b6;
      --red: #e63946;
      --text: #daeeff;
      --text2: #4a7fa5;
      --bdr: rgba(0, 180, 216, .15);
      --fh: 'Rajdhani', sans-serif;
      --fm: 'Share Tech Mono', monospace;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0
    }

    html,
    body {
      height: 100%;
      overflow: hidden
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--fh);
      display: flex;
      flex-direction: column;
    }

    .top-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 20px;
      height: 50px;
      background: rgba(4, 12, 24, .98);
      border-bottom: 1px solid var(--bdr);
      flex-shrink: 0;
    }

    .top-bar h1 {
      font-size: 18px;
      font-weight: 700;
      letter-spacing: 3px;
      color: var(--teal);
      text-transform: uppercase
    }

    .top-meta {
      display: flex;
      align-items: center;
      gap: 18px;
      font-family: var(--fm);
      font-size: 11px;
      color: var(--text2)
    }

    .top-meta b {
      color: var(--gold)
    }

    .sp {
      padding: 3px 12px;
      border-radius: 20px;
      font-size: 11px;
      background: rgba(0, 180, 216, .1);
      border: 1px solid rgba(0, 180, 216, .25);
      color: var(--teal)
    }

    .sp.fall {
      background: rgba(244, 162, 97, .1);
      border-color: rgba(244, 162, 97, .25);
      color: var(--gold)
    }

    .sp.winter {
      background: rgba(142, 202, 230, .1);
      border-color: rgba(142, 202, 230, .22);
      color: #8ecae6
    }

    .sp.spring {
      background: rgba(46, 196, 182, .1);
      border-color: rgba(46, 196, 182, .22);
      color: var(--green)
    }

    .sp.summer {
      background: rgba(230, 57, 70, .1);
      border-color: rgba(230, 57, 70, .22);
      color: var(--red)
    }

    .sp.setup {
      background: rgba(142, 202, 230, .08);
      border-color: rgba(142, 202, 230, .18);
      color: #8ecae6
    }

    .rfbtn {
      padding: 3px 12px;
      background: rgba(0, 180, 216, .07);
      border: 1px solid var(--bdr);
      border-radius: 4px;
      color: var(--text2);
      font-family: var(--fm);
      font-size: 11px;
      cursor: pointer;
    }

    .rfbtn:hover {
      border-color: var(--teal);
      color: var(--teal)
    }

    .board-area {
      flex: 1;
      display: grid;
      grid-template-columns: 1fr 270px;
      overflow: hidden;
      min-height: 0;
    }

    .map-panel {
      position: relative;
      overflow: auto;
      background: #040c18;
    }

    .map-wrapper {
      position: relative;
      width: 100%;
      min-width: 800px;
      max-width: 1000px;
      margin: 0 auto;
    }

    .map-wrapper img {
      width: 100%;
      display: block;
    }

    .overlay {
      position: absolute;
      inset: 0;
      pointer-events: none;
    }

    .mk {
      position: absolute;
      transform: translate(-50%, -50%);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1px;
      pointer-events: all;
      cursor: default;
    }

    .mk-inner {
      background: rgba(4, 12, 24, .82);
      border: 1px solid rgba(255, 255, 255, .2);
      border-radius: 6px;
      padding: 3px 5px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1px;
      min-width: 28px;
    }

    .mk:hover .mk-inner {
      border-color: var(--teal);
    }

    .mk-flag {
      font-size: 12px;
      line-height: 1;
    }

    .mk-icon {
      font-size: 10px;
      line-height: 1;
    }

    .mk-id {
      font-family: var(--fm);
      font-size: 8px;
      color: rgba(255, 255, 255, .45);
      line-height: 1;
    }

    .mk-label {
      font-family: var(--fm);
      font-size: 8px;
      color: var(--gold);
      line-height: 1;
      white-space: nowrap;
      max-width: 60px;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .mk-base {
      width: 12px;
      height: 12px;
      border-radius: 2px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 9px;
    }

    .mk-build {
      opacity: .65;
      border-style: dashed !important;
    }

    .tooltip {
      display: none;
      position: absolute;
      bottom: calc(100% + 4px);
      left: 50%;
      transform: translateX(-50%);
      background: rgba(4, 12, 24, .97);
      border: 1px solid rgba(0, 180, 216, .3);
      border-radius: 6px;
      padding: 7px 10px;
      white-space: nowrap;
      font-family: var(--fm);
      font-size: 11px;
      color: var(--text);
      z-index: 50;
      pointer-events: none;
    }

    .mk:hover .tooltip {
      display: block;
    }

    .sidebar-panel {
      border-left: 1px solid var(--bdr);
      background: rgba(4, 12, 24, .85);
      overflow-y: auto;
      padding: 12px 10px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .cc {
      border: 1px solid var(--bdr);
      border-radius: 8px;
      padding: 10px 11px;
    }

    .cc h3 {
      font-size: 13px;
      font-weight: 600;
      letter-spacing: .8px;
      margin-bottom: 7px;
      display: flex;
      align-items: center;
      gap: 5px;
    }

    .cc-stats {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 5px;
      margin-bottom: 6px;
    }

    .cs {
      text-align: center;
      background: rgba(0, 180, 216, .05);
      border-radius: 4px;
      padding: 5px 3px;
    }

    .csv {
      font-family: var(--fm);
      font-size: 15px;
      color: var(--teal);
    }

    .csl {
      font-size: 8px;
      color: var(--text2);
      letter-spacing: .5px;
      text-transform: uppercase;
    }

    .c-ships {
      display: flex;
      flex-wrap: wrap;
      gap: 3px;
    }

    .spip {
      background: rgba(255, 255, 255, .05);
      border-radius: 3px;
      padding: 1px 4px;
      font-family: var(--fm);
      font-size: 9px;
      color: var(--text2);
    }

    .legend {
      border: 1px solid var(--bdr);
      border-radius: 8px;
      padding: 10px 11px;
    }

    .legend h3 {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 1px;
      margin-bottom: 7px;
      color: var(--text2);
      text-transform: uppercase;
    }

    .li-item {
      display: flex;
      align-items: center;
      gap: 6px;
      font-family: var(--fm);
      font-size: 10px;
      color: var(--text2);
      margin-bottom: 3px;
    }

    .li-dot {
      width: 9px;
      height: 9px;
      border-radius: 2px;
      flex-shrink: 0;
    }

    .conf-panel {
      background: rgba(230, 57, 70, .1);
      border: 1px solid rgba(230, 57, 70, .3);
      border-radius: 7px;
      padding: 10px 11px;
    }

    .conf-panel h3 {
      font-size: 12px;
      font-weight: 600;
      color: var(--red);
      margin-bottom: 5px;
    }

    .conf-item {
      font-family: var(--fm);
      font-size: 10px;
      color: var(--red);
      padding: 2px 0;
    }

    #last-updated {
      font-family: var(--fm);
      font-size: 9px;
      color: var(--text2);
      text-align: center;
      padding: 5px;
      border-top: 1px solid var(--bdr);
    }

    .spin {
      width: 16px;
      height: 16px;
      border: 2px solid rgba(0, 180, 216, .2);
      border-top-color: var(--teal);
      border-radius: 50%;
      animation: spin .6s linear infinite;
      display: inline-block;
      vertical-align: middle;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg)
      }
    }
  </style>
</head>

      const sL = { setup: '◈ Setup', fall: '◆ Fall', winter: '❄ Winter', spring: '◉ Spring', summer: '⚔ Summer' };
      const sp = document.getElementById('b-sp');
      sp.textContent = sL[config.season] || config.season; sp.className = 'sp ' + config.season;

      const byTile = {};
      troops.forEach(s => { if (!s.tile) return; if (!byTile[s.tile]) byTile[s.tile] = []; byTile[s.tile].push(s); });
      const conflicts = Object.entries(byTile).map(([tile, ships]) => {
        const cs = [...new Set(ships.map(s => s.country))]; return cs.length > 1 ? { tile, countries: cs, ships } : null;
      }).filter(Boolean);

      const cp = document.getElementById('conf-panel'), cl = document.getElementById('conf-list');
      if (conflicts.length) {
        cp.style.display = 'block';
        cl.innerHTML = conflicts.map(x => '<div class="conf-item">Tile ' + x.tile + ' (' + tz(x.tile) + '): ' + x.countries.join(' vs ') + '</div>').join('');
      } else cp.style.display = 'none';

      const overlay = document.getElementById('overlay'); overlay.innerHTML = '';

      function mk(tileId) {
        const pct = TILE_PCT[tileId]; if (!pct) return null;
        const el = document.createElement('div'); el.className = 'mk';
        el.style.left = pct[0] + '%'; 
        el.style.top = pct[1] + '%';
        return el;
      }

      Object.entries(byTile).forEach(([tile, ships]) => {
        const m = mk(tile); if (!m) return;
        const bBase = bases.find(b => String(b.tile) === String(tile));
        const countries = [...new Set(ships.map(s => s.country))];
        const inConf = conflicts.some(c => c.tile === tile);
        const fl = fleets.find(f => ships.length > 0 && ships.every(s => f.ship_ids && f.ship_ids.includes(s.id)));
        const typeCounts = {}; ships.forEach(s => { typeCounts[s.type] = (typeCounts[s.type] || 0) + 1; });
        const zc = countries.length === 1 ? (ZONE_COLORS[countries[0]] || 'rgba(255,255,255,.2)') : 'rgba(255,255,255,.2)';
        const bStyle = inConf ? 'border-color:rgba(230,57,70,.85);background:rgba(230,57,70,.18);' : 'border-color:' + zc + ';';
        const flagsHtml = countries.slice(0, 3).map(c => '<span class="mk-flag">' + (FLAGS[c] || '') + '</span>').join('')
          + (countries.length > 3 ? '<span style="font-size:9px;opacity:.5;">+' + (countries.length - 3) + '</span>' : '');
        const iconsHtml = Object.entries(typeCounts).map(([t, n]) => '<span class="mk-icon">' + se(t) + (n > 1 ? 'x' + n : '') + '</span>').join('');
        const baseHtml = bBase ? '<div class="mk-base ' + (bBase.status === 'construction' ? 'mk-build' : '') + '" style="background:rgba(255,255,255,0.25);font-size:9px;padding:1px 2px;">⚓</div>' : '';
        const flHtml = fl ? '<div class="mk-label">⚓' + fl.name + '</div>' : '';
        const tipLines = ships.map(s => {
          const sf = fleets.find(f => f.ship_ids && f.ship_ids.includes(s.id));
          return (sf ? '[⚓' + sf.name + '] ' : '') + (FLAGS[s.country] || '') + ' ' + s.id + ' ' + se(s.type) + ' HP:' + s.hp;
        }).join('<br>');
        const baseTip = bBase ? (FLAGS[bBase.country] || '') + ' ' + bBase.country + ' base' + (bBase.status === 'construction' ? ' (building)' : '') + '<br>' : '';
        m.innerHTML = '<div class="mk-inner" style="' + bStyle + '">'
          + '<div style="display:flex;gap:1px;">' + flagsHtml + '</div>'
          + '<div style="display:flex;gap:2px;flex-wrap:wrap;justify-content:center;align-items:center;">' + baseHtml + iconsHtml + '</div>'
          + flHtml + '<div class="mk-id">T' + tile + '</div></div>'
          + '<div class="tooltip">' + baseTip + tipLines + '</div>';
        overlay.appendChild(m);
      });

      bases.forEach(b => {
        if (byTile[b.tile]) return;
        const m = mk(b.tile); if (!m) return;
        const zc = ZONE_COLORS[tz(b.tile)] || '#555';
        const isBuild = b.status === 'construction';
        m.innerHTML = '<div class="mk-inner ' + (isBuild ? 'mk-build' : '') + '" style="border-color:' + zc + '40;">'
          + '<div class="mk-flag">' + (FLAGS[b.country] || '') + '</div>'
          + '<div class="mk-base" style="background:' + zc + '30;">⚓</div>'
          + '<div class="mk-id">T' + b.tile + (isBuild ? '*' : '') + '</div></div>'
          + '<div class="tooltip">' + (FLAGS[b.country] || '') + ' ' + b.country + ' base' + (isBuild ? ' (building)' : '') + '</div>';
        overlay.appendChild(m);
      });

      document.getElementById('country-cards').innerHTML = COUNTRIES.map(c => {
        const myT = troops.filter(s => s.country === c);
        const myB = bases.filter(b => b.country === c && b.status === 'active');
        const myBuild = bases.filter(b => b.country === c && b.status === 'construction');
        const myFl = fleets.filter(f => f.country === c);
        const tc = {}; myT.forEach(s => { tc[s.type] = (tc[s.type] || 0) + 1; });
        const inConf = conflicts.some(x => x.countries.includes(c));
        const zc = ZONE_COLORS[c] || 'var(--text)';
        const pips = Object.entries(tc).map(([t, n]) => '<span class="spip">' + se(t) + 'x' + n + '</span>').join('');
        const flPips = myFl.map(f => '<span style="font-family:var(--fm);font-size:9px;color:#ffd166;">⚓' + f.name + '(' + (f.ship_ids || []).length + ')</span>').join(' ');
        return '<div class="cc"' + (inConf ? ' style="border-color:rgba(230,57,70,.5);"' : '') + '>' +
          '<h3 style="color:' + zc + ';">' + (FLAGS[c] || '') + ' ' + c + '</h3>' +
          '<div class="cc-stats">' +
          '<div class="cs"><div class="csv">?</div><div class="csl">Gold</div></div>' +
          '<div class="cs"><div class="csv">' + myT.length + '</div><div class="csl">Ships</div></div>' +
          '<div class="cs"><div class="csv">' + myB.length + '</div><div class="csl">Bases</div></div>' +
          '</div>' +
          (pips ? '<div class="c-ships">' + pips + '</div>' : '') +
          (flPips ? '<div style="margin-top:4px;">' + flPips + '</div>' : '') +
          (myBuild.length ? '<div style="font-family:var(--fm);font-size:9px;color:#ffd166;margin-top:3px;">🏗 Building: ' + myBuild.length + '</div>' : '') +
          (inConf ? '<div style="font-size:9px;color:var(--red);margin-top:3px;font-family:var(--fm);">⚠ In conflict</div>' : '') +
          '</div>';
      }).join('');

      document.getElementById('legend-items').innerHTML = Object.entries(ZONE_COLORS).map(([z, c]) =>
        '<div class="li-item"><div class="li-dot" style="background:' + c + ';opacity:.85;"></div>' + z + '</div>'
      ).join('');
    }

    document.getElementById('bmap').src = MAP_SRC;
    document.getElementById('bmap').onload = () => { loadBoard(); };
    window.addEventListener('resize', () => { if (bData.troops.length || bData.bases.length) renderBoard(); });
    setInterval(loadBoard, 30000);

  </script>
</body>

</html>
